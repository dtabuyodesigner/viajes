<style>
:root{
  --karst:#0E2A28;        /* fondo profundo, roca kárstica */
  --karst-2:#163B37;      /* superficie elevada */
  --soca:#4FC3B8;         /* turquesa del río Soča */
  --soca-dim:#2C7C76;
  --panel:#D9A233;        /* ocre de las colmenas eslovenas */
  --panel-red:#C0503F;    /* rojo de las colmenas */
  --paper:#EAF0EC;        /* texto principal */
  --paper-dim:#8FA8A2;    /* texto secundario */
  --line:rgba(79,195,184,.18);
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--karst);
  color:var(--paper);
  font-family:var(--sans);
  font-size:16px;
  line-height:1.5;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
}
a{color:var(--soca);text-decoration:none}
:focus-visible{outline:2px solid var(--panel);outline-offset:2px;border-radius:4px}

/* ---------- Cabecera ---------- */
header{
  position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,var(--karst) 72%,rgba(14,42,40,0));
  padding:calc(14px + env(safe-area-inset-top)) 20px 18px;
}
.volver{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--paper-dim);text-decoration:none;margin:0 0 12px;
  padding:5px 11px 5px 8px;border:1px solid var(--line);border-radius:999px}
.volver:active{color:var(--soca)}
.eyebrow{
  font-family:var(--mono);font-size:11px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--soca-dim);margin:0 0 4px;
}
h1{
  font-size:27px;line-height:1.12;letter-spacing:-.025em;
  font-weight:800;margin:0;
}
.sub{color:var(--paper-dim);font-size:14px;margin:6px 0 0}

/* ---------- Contenido ---------- */
main{padding:0 20px 32px;max-width:640px;margin:0 auto}
.view{display:none;animation:in .22s ease-out}
.view.on{display:block}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.view{animation:none}}

/* ---------- Línea del río: timeline ---------- */
.river{position:relative;margin:8px 0 0;padding-left:28px}
.river::before{
  content:"";position:absolute;left:7px;top:8px;bottom:8px;width:3px;
  background:linear-gradient(180deg,var(--soca),var(--soca-dim));
  border-radius:3px;opacity:.55;
}
.stop{position:relative;padding:0 0 22px}
.stop::before{
  content:"";position:absolute;left:-25px;top:7px;width:11px;height:11px;
  border-radius:50%;background:var(--karst);border:3px solid var(--soca);
}
.stop.key::before{background:var(--panel);border-color:var(--panel)}
.t{font-family:var(--mono);font-size:12px;color:var(--panel);letter-spacing:.06em;display:block;margin-bottom:2px}
.stop p{margin:0;font-size:16px}
.stop small{display:block;color:var(--paper-dim);font-size:13.5px;margin-top:3px;line-height:1.45}

/* ---------- Tarjetas ---------- */
.card{
  background:var(--karst-2);border:1px solid var(--line);
  border-radius:14px;padding:16px;margin:0 0 12px;
}
.card h3{margin:0 0 10px;font-size:16px;letter-spacing:-.01em}
.label{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--soca-dim);
}
.row{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-top:1px solid var(--line)}
.row:first-of-type{border-top:0}
.row .k{color:var(--paper-dim);font-size:14px;flex:0 0 auto}
.row .v{text-align:right;font-size:15px}
.mono{font-family:var(--mono);letter-spacing:.03em}
.fill{color:var(--panel-red);font-family:var(--mono);font-size:13px}

/* ---------- Lista de días ---------- */
.day{
  width:100%;text-align:left;display:flex;gap:14px;align-items:baseline;
  background:none;border:0;border-top:1px solid var(--line);
  padding:15px 2px;color:inherit;font:inherit;cursor:pointer;
}
.day:first-child{border-top:0}
.day .num{font-family:var(--mono);font-size:12.5px;color:var(--soca);flex:0 0 46px;letter-spacing:.04em}
.day .ttl{font-size:16px;font-weight:600;letter-spacing:-.01em}
.day .wd{display:block;font-size:12.5px;color:var(--paper-dim);font-weight:400;margin-top:2px}
.day.past{opacity:.42}
.day.today .num{color:var(--panel);font-weight:700}
.day.today .ttl::after{content:" ·  hoy";color:var(--panel);font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase}

/* ---------- Botones ---------- */
.btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.btn{
  display:inline-block;padding:9px 14px;border-radius:999px;
  border:1px solid var(--soca-dim);color:var(--soca);
  font-size:13.5px;font-weight:600;background:none;cursor:pointer;
}
.btn.solid{background:var(--soca);color:var(--karst);border-color:var(--soca)}

/* ---------- Nav inferior ---------- */
nav{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  display:grid;grid-template-columns:repeat(5,1fr);
  background:rgba(14,42,40,.94);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
nav button{
  background:none;border:0;padding:11px 4px 12px;cursor:pointer;
  color:var(--paper-dim);font-family:var(--mono);
  font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
}
nav button svg{display:block;margin:0 auto 5px;width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--soca)}
.sec{margin:26px 0 10px}
.sec .label{display:block;margin-bottom:2px}

  background:transparent;border:1px solid var(--line);color:var(--paper);font:inherit}
.op b{display:block;font-size:14px;font-weight:600}
.op small{display:block;font-size:11.5px;color:var(--paper-dim);margin-top:2px;line-height:1.35}

.op.on b{color:var(--soca)}
.park{display:flex;gap:10px;align-items:flex-start;margin:10px 0 0;padding:10px 12px;
  background:rgba(217,162,51,.09);border:1px solid rgba(217,162,51,.3);border-radius:11px}
.park.free{background:rgba(79,195,184,.1);border-color:rgba(79,195,184,.35)}
.park .pk{flex:0 0 auto;width:20px;height:20px;border-radius:5px;background:var(--panel);color:var(--karst);
  font-family:var(--mono);font-size:12px;font-weight:700;display:grid;place-items:center;margin-top:1px}
.park.free .pk{background:var(--soca)}
.park b{display:block;font-size:13.5px;font-weight:600;color:var(--paper)}
.park small{display:block;color:var(--paper-dim);font-size:12.5px;line-height:1.45;margin-top:2px}
.ruta{background:var(--karst-2);border:1px solid var(--line);border-radius:14px;padding:15px;margin:0 0 20px}
.wz-par{display:inline-flex;align-items:stretch}
.wz-alt{display:inline-flex;align-items:center;padding:0 9px;margin-left:-8px;
  border:1px solid var(--line);border-left:0;border-radius:0 999px 999px 0;
  font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--paper-dim);text-decoration:none}
.wz{border-radius:999px 0 0 999px}
.wz-par .wz{border-right:0}
.wz-lista{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.wz{display:inline-flex;align-items:center;gap:8px;padding:9px 13px 9px 9px;border-radius:999px;
  border:1px solid var(--soca-dim);color:var(--paper);font-size:13.5px;font-weight:500;
  text-decoration:none;max-width:100%}
.wz b{flex:0 0 auto;width:21px;height:21px;border-radius:50%;background:var(--soca);color:var(--karst);
  font-family:var(--mono);font-size:11.5px;font-weight:700;display:grid;place-items:center}
.wz.cama{border-color:var(--panel);}
.wz.cama b{background:var(--panel)}
.foto{display:block;width:100%;height:auto;border-radius:14px;border:1px solid var(--line);background:#0A1F1D}
.pie{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--paper-dim);
  margin:8px 2px 20px;line-height:1.5}
.art{display:block;width:100%;height:120px;border-radius:14px;margin:2px 0 18px;background:#0A1F1D;border:1px solid var(--line)}
.zona{margin:24px 0 0}
.zona-cab{display:flex;align-items:baseline;gap:10px;margin-bottom:2px}
.zona h2{margin:0;font-size:19px;letter-spacing:-.02em}
.zona .cuenta{font-family:var(--mono);font-size:11px;color:var(--soca-dim)}
.zona .intro{font-size:13.5px;color:var(--paper-dim);margin:4px 0 12px;line-height:1.5}
.btn.app{border-color:var(--panel);color:var(--panel)}

  background:rgba(90,169,196,.08);border:1px solid var(--soca)}

.btn.civ{border-color:#F70759;color:#F70759}

.lugar:first-of-type{border-top:0}
.lugar-cab{width:100%;display:flex;justify-content:space-between;align-items:center;gap:12px;

.lugar-cab .nom{font-size:15.5px;font-weight:600;letter-spacing:-.01em}
.lugar-cab .dia{display:block;font-family:var(--mono);font-size:11px;color:var(--panel);
  letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.lugar-cab .mas{flex:0 0 auto;color:var(--soca);font-size:19px;line-height:1;transition:transform .2s}
.lugar.abierto .mas{transform:rotate(45deg)}
.lugar-cuerpo{display:none;padding:0 2px 18px}
.lugar.abierto .lugar-cuerpo{display:block}
.lugar-cuerpo p{margin:0 0 12px;font-size:14.5px;line-height:1.55;color:#CBDAD5}
.datos{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}

.lnk{background:none;border:0;padding:0;font:inherit;color:var(--soca);cursor:pointer;

.note{font-size:13.5px;color:var(--paper-dim);line-height:1.5;margin:10px 0 0}

.stop .tick{margin-left:9px;width:22px;height:22px;border-radius:50%;vertical-align:middle;

.stop.hecho::before{background:var(--soca);border-color:var(--soca)}

const DIAS_SEM = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const VERSION = "v25 · 24/07 19:12";
const esc = s => String(s??"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const mapsDe = q => `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(q)}&travelmode=driving`;
const wikiloc = q => `https://es.wikiloc.com/wikiloc/map.do?q=${encodeURIComponent(q)}`;
const mapa = q => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
const fecha = f => { const d = new Date(f+"T12:00:00"); return {d, wd:DIAS_SEM[d.getDay()], txt:`${d.getDate()} ${MESES[d.getMonth()]}`}; };

function hoyISO(){
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`;
}
function indiceHoy(){
  const h = hoyISO();
  const i = VIAJE.dias.findIndex(d => d.f === h);
  if (i >= 0) return i;
  if (h < VIAJE.dias[0].f) return 0;                       // aún no ha empezado
  return VIAJE.dias.length - 1;                            // ya ha terminado
}

function pintaParadas(dia, iDia){
  const clase = "river";
  return `<div class="${clase}">` + dia.paradas.map((p, k) => {
    const clave = `${iDia}:${k}`;
    const ok = DIARIO.esta(clave);
    return `
    <div class="stop${p.key ? " key" : ""}${ok ? " hecho" : ""}" data-marca="${clave}">
      ${p.h ? `<span class="t">${esc(p.h)}</span>` : ""}
      <p>${esc(p.txt)}<button class="tick" aria-label="Marcar">${ok ? "✓" : ""}</button></p>
      ${p.n ? `<small>${esc(p.n)}</small>` : ""}
      ${p.mapa ? `<small><a href="${navegar(p.park?.w || p.w || p.mapa)}" target="_blank" rel="noopener">Ir con ${comoNavego()} →</a>${PREF.app === "waze" ? ` <a href="${mapsDe(p.park?.w || p.w || p.mapa)}" target="_blank" rel="noopener" style="color:var(--papel-dim)">· Maps</a>`.replace("--papel-dim", "--paper-dim") : ""}</small>` : ""}
      ${p.wl ? `<small><a href="${wikiloc(p.wl)}" target="_blank" rel="noopener">Buscar la ruta en Wikiloc →</a></small>` : ""}
      ${p.g ? `<small><button class="lnk" data-guia="${esc(p.g)}">Qué es y qué ver →</button></small>` : ""}
      ${p.park ? `<div class="park${p.park.gratis ? " free" : ""}">
        <span class="pk">P</span>
        <div><b>${esc(p.park.n)}</b><small>${esc(p.park.p)}</small></div>
      </div>` : ""}
    </div>`; }).join("") + `</div>` + cajaNota(iDia);
}

function cajaNota(i){
  return `<div class="diario">
    <span class="label">Notas del día</span>
    <textarea class="nota-txt" data-dia="${i}" rows="2"
      placeholder="Dónde aparcamos, cuánto costó, qué tal se comió…">${esc(DIARIO.nota(i))}</textarea>
    <div class="btns">
      ${VOZ ? `<button class="btn voz" data-dictar="${i}">Dictar</button>` : ""}
      <button class="btn" id="btn-compartir">Compartir el diario</button>
    </div>
    ${VOZ ? "" : `<p class="note">Para dictar, usa el micrófono del teclado del móvil.</p>`}
  </div>`;
}

function activaDiario(){
  document.querySelectorAll("[data-marca] .tick").forEach(b => {
    if (b.dataset.listo) return; b.dataset.listo = "1";
    b.addEventListener("click", e => {
      e.stopPropagation();
      const box = b.closest("[data-marca]");
      DIARIO.marcar(box.dataset.marca);
      box.classList.toggle("hecho");
      b.textContent = box.classList.contains("hecho") ? "✓" : "";
    });
  });
  document.querySelectorAll("[data-dictar]").forEach(b => {
    if (b.dataset.listo) return; b.dataset.listo = "1";
    b.addEventListener("click", () => {
      const t = document.querySelector(`.nota-txt[data-dia="${b.dataset.dictar}"]`);
      if (t) escuchar(t, b);
    });
  });
  const comp = document.getElementById("btn-compartir");
  if (comp && !comp.dataset.listo){ comp.dataset.listo = "1"; comp.addEventListener("click", compartirDiario); }
  document.querySelectorAll(".nota-txt").forEach(t => {
    if (t.dataset.listo) return; t.dataset.listo = "1";
    const crece = () => { t.style.height = "auto"; t.style.height = t.scrollHeight + "px"; };
    crece();
    t.addEventListener("input", () => { crece(); DIARIO.guardarNota(+t.dataset.dia, t.value); });
  });
}




/* ---- Preferencias de navegación (guardadas en este móvil) ---- */
const PREF = {
  get app(){ try { return localStorage.getItem("nav_app") || "waze"; } catch { return "waze"; } },
  set app(v){ try { localStorage.setItem("nav_app", v); } catch {} },
  get via(){ try { return localStorage.getItem("nav_via") || "rapido"; } catch { return "rapido"; } },
  set via(v){ try { localStorage.setItem("nav_via", v); } catch {} }
};

const EVITAR = { rapido:"", sinpeajes:"tolls", secundarias:"tolls,highways" };
const VIAS = [
  ["rapido",      "Lo más rápido",  "Autopista incluida"],
  ["sinpeajes",   "Sin peajes",     "Autovía y nacional"],
  ["secundarias", "Por carreteras", "Evita autopista y peaje"]
];

/* Enlace de navegación a un destino, según lo que tenga elegido */
function navegar(q){
  if (PREF.app === "waze") return `waze://?q=${encodeURIComponent(q)}&navigate=yes`;
  const u = new URLSearchParams({ api:"1", destination:q, travelmode:"driving" });
  const ev = EVITAR[PREF.via];
  if (ev) u.set("avoid", ev);
  return `https://www.google.com/maps/dir/?${u}`;
}
const comoNavego = () => PREF.app === "waze" ? "Waze" : "Maps";


/* ---- Lo que vais anotando, guardado en este móvil ---- */
const DIARIO = {
  _leer(k, def){ try { return JSON.parse(localStorage.getItem("eslo_" + k)) ?? def; } catch { return def; } },
  _escribir(k, v){ try { localStorage.setItem("eslo_" + k, JSON.stringify(v)); } catch {} },
  get hechas(){ return this._leer("hechas", {}); },
  marcar(clave){ const h = this.hechas; h[clave] = !h[clave]; if (!h[clave]) delete h[clave]; this._escribir("hechas", h); },
  esta(clave){ return !!this.hechas[clave]; },
  nota(i){ return this._leer("notas", {})[i] || ""; },
  guardarNota(i, t){ const n = this._leer("notas", {}); t.trim() ? n[i] = t : delete n[i]; this._escribir("notas", n); },
  get tema(){ try { return localStorage.getItem("eslo_tema") || "oscuro"; } catch { return "oscuro"; } },
  set tema(v){ try { localStorage.setItem("eslo_tema", v); } catch {}; aplicaTema(); }
};

function aplicaTema(){
  document.body.classList.toggle("claro", DIARIO.tema === "claro");
  const m = document.querySelector('meta[name="theme-color"]');
  if (m) m.setAttribute("content", DIARIO.tema === "claro" ? "#F4F6F3" : m.dataset.oscuro || m.getAttribute("content"));
}

/* ---- Dónde estamos ---- */
let MIPOS = null;
function pedirUbicacion(){
  return new Promise((ok, mal) => {
    if (!navigator.geolocation) return mal("sin gps");
    navigator.geolocation.getCurrentPosition(
      p => { MIPOS = [p.coords.latitude, p.coords.longitude]; ok(MIPOS); },
      e => mal(e.message), { enableHighAccuracy:false, timeout:9000, maximumAge:120000 });
  });
}
function distancia(a, b){
  const R = 6371, r = x => x * Math.PI / 180;
  const dLat = r(b[0]-a[0]), dLon = r(b[1]-a[1]);
  const h = Math.sin(dLat/2)**2 + Math.cos(r(a[0]))*Math.cos(r(b[0]))*Math.sin(dLon/2)**2;
  return Math.round(2 * R * Math.asin(Math.sqrt(h)));
}

/* ---- El tiempo ---- */
const tiempoEn = q => `https://www.google.com/search?q=${encodeURIComponent("tiempo " + q)}`;


const TITULO_DIA = (d, i) => { const f = fecha(d.f); return `${f.wd} ${f.txt}`; };

/* ---- Dictado por voz, si el navegador lo permite ---- */
const VOZ = window.SpeechRecognition || window.webkitSpeechRecognition || null;

function escuchar(destino, boton){
  if (!VOZ) return;
  const r = new VOZ();
  r.lang = "es-ES"; r.continuous = true; r.interimResults = false;
  let previo = destino.value;
  boton.classList.add("grabando"); boton.textContent = "● Escuchando";
  r.onresult = e => {
    let t = "";
    for (let i = e.resultIndex; i < e.results.length; i++)
      if (e.results[i].isFinal) t += e.results[i][0].transcript;
    if (!t) return;
    destino.value = (previo ? previo.trimEnd() + " " : "") + t.trim();
    previo = destino.value;
    destino.dispatchEvent(new Event("input", {bubbles:true}));
  };
  const parar = () => { boton.classList.remove("grabando"); boton.textContent = "Dictar"; };
  r.onerror = parar; r.onend = parar;
  boton.onclick = () => { r.stop(); parar(); boton.onclick = null; activaDiario(); };
  r.start();
}

/* ---- Compartir el diario ---- */
function textoDiario(){
  const lineas = [`${VIAJE.nombre}`, ""];
  VIAJE.dias.forEach((d, i) => {
    const hechas = d.paradas.filter((p, k) => DIARIO.esta(`${i}:${k}`));
    const nota = DIARIO.nota(i);
    if (!hechas.length && !nota) return;
    lineas.push(`${TITULO_DIA(d, i)} — ${d.t}`);
    hechas.forEach(p => lineas.push(`  · ${p.txt}`));
    if (nota) lineas.push(`  "${nota}"`);
    lineas.push("");
  });
  return lineas.length > 2 ? lineas.join("\n") : "";
}

async function compartirDiario(){
  const t = textoDiario();
  if (!t) return alert("Todavía no hay nada marcado ni escrito.");
  try {
    if (navigator.share) await navigator.share({ title: VIAJE.nombre, text: t });
    else { await navigator.clipboard.writeText(t); alert("Copiado. Pégalo donde quieras."); }
  } catch {}
}

/* ---- Rutas del día ---- */
const waze = q => `waze://?q=${encodeURIComponent(q)}&navigate=yes`;

function rutaDelDia(i){
  const d = VIAJE.dias[i];
  const previo = i > 0 ? VIAJE.dias[i-1].dest : "Aeroporto Marco Polo Venezia";
  const paradas = d.paradas.filter(p => p.mapa).map(p => p.mapa);
  const u = new URLSearchParams({ api:"1", origin:previo, destination:d.dest, travelmode:"driving" });
  if (paradas.length) u.set("waypoints", paradas.slice(0, 9).join("|"));
  const ev = EVITAR[PREF.via];
  if (ev) u.set("avoid", ev);
  return { url:`https://www.google.com/maps/dir/?${u}`, n:paradas.length };
}

function botonesRuta(i){
  const d = VIAJE.dias[i], r = rutaDelDia(i);
  const tramos = d.paradas.filter(p => p.mapa);

  const chips = tramos.map((p, k) =>
    `<span class="wz-par"><a class="wz" href="${navegar(p.park?.w || p.w || p.mapa)}" target="_blank" rel="noopener">
       <b>${k+1}</b>${esc(p.c || p.txt)}</a>${PREF.app === "waze"
         ? `<a class="wz-alt" href="${mapsDe(p.park?.w || p.w || p.mapa)}" target="_blank" rel="noopener" title="Abrir en Maps">map</a>` : ""}</span>`).join("");

  return `<div class="ruta">
    <span class="label">Navegar con ${comoNavego()}</span>
    <div class="wz-lista">${chips}
      ${d.dest ? `<a class="wz cama" href="${navegar(d.dest)}" target="_blank" rel="noopener">
        <b>${tramos.length+1}</b>Alojamiento</a>` : ""}</div>
    <div class="btns"><a class="btn" href="${tiempoEn(d.dest)}" target="_blank" rel="noopener">El tiempo hoy</a></div>
    <p class="note" style="margin:10px 0 0">Waze solo lleva a un sitio por vez: dale al siguiente número según vayas llegando.
    ${r.n ? `<a href="${r.url}" target="_blank" rel="noopener">Ver la ruta entera en Maps →</a>` : ""}</p>
  </div>`;
}

const etiqueta = (d, i) => String(new Date(d.f + "T12:00:00").getDate());

/* ---- Mapa de la ruta, dibujado con las coordenadas reales ---- */
function mapaRuta(){
  const puntos = [], camas = new Map();
  VIAJE.dias.forEach((d, i) => {
    d.paradas.forEach(p => {
      const c = p.xy || (p.g && LUGARES[p.g] && LUGARES[p.g].xy);
      if (c) puntos.push({ xy:c.split(",").map(Number), dia:i, tipo:"parada" });
    });
    if (d.xy){
      puntos.push({ xy:d.xy.split(",").map(Number), dia:i, tipo:"cama" });
      if (!camas.has(d.xy)) camas.set(d.xy, []);
      camas.get(d.xy).push(i);              // varios días pueden dormir en el mismo sitio
    }
  });
  if (puntos.length < 3) return "";

  const lats = puntos.map(p => p.xy[0]), lons = puntos.map(p => p.xy[1]);
  const lat0 = (Math.min(...lats) + Math.max(...lats)) / 2;
  const k = Math.cos(lat0 * Math.PI / 180);
  const W = 400, H = 250, M = 30;
  const xs = lons.map(l => l * k), ys = lats;
  const [x0,x1,y0,y1] = [Math.min(...xs), Math.max(...xs), Math.min(...ys), Math.max(...ys)];
  const e = Math.min((W - 2*M) / ((x1-x0) || 1), (H - 2*M) / ((y1-y0) || 1));
  const cx = v => M + (v * k - x0) * e + ((W - 2*M) - (x1-x0)*e) / 2;
  const cy = v => H - M - (v - y0) * e - ((H - 2*M) - (y1-y0)*e) / 2;

  const linea = puntos.map(p => `${cx(p.xy[1]).toFixed(1)},${cy(p.xy[0]).toFixed(1)}`).join(" ");
  const hoy = indiceHoy();

  // Las paradas, detrás
  const pequenos = puntos.filter(p => p.tipo === "parada").map(p =>
    `<circle class="par${p.dia === hoy ? " act" : ""}" cx="${cx(p.xy[1]).toFixed(1)}"
      cy="${cy(p.xy[0]).toFixed(1)}" r="${p.dia === hoy ? 4 : 2.6}"/>`).join("");

  // Un solo círculo por alojamiento, con todos sus días en la etiqueta
  let arriba = true;
  const grandes = [...camas.entries()].map(([c, dias]) => {
    const [la, lo] = c.split(",").map(Number);
    const x = cx(lo).toFixed(1), y = cy(la);
    const act = dias.includes(hoy);
    const r = act ? 7.5 : 5.5;
    arriba = !arriba;
    const dy = arriba ? -(r + 6) : (r + 12);
    return `<g class="cama${act ? " act" : ""}" data-dia="${dias[0]}">
      <circle cx="${x}" cy="${y.toFixed(1)}" r="${r}"/>
      ${dias.length > 1 ? `<text class="cuenta" x="${x}" y="${(y + 2.6).toFixed(1)}">${dias.length}</text>` : ""}
      <text x="${x}" y="${(y + dy).toFixed(1)}">${esc(rotulo(dias))}</text>
    </g>`;
  }).join("");

  return `<div class="mapa">
    <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Mapa de la ruta">
      <polyline points="${linea}"/>
      ${pequenos}${grandes}
    </svg>
    <p class="note" style="margin:8px 2px 0">Posiciones reales, unidas en el orden del viaje. El número dentro de un punto son las noches. Toca para ir a ese día.</p>
  </div>`;
}

/* Etiqueta de un alojamiento: agrupa los días consecutivos */
function rotulo(dias){
  const partes = [];
  let ini = dias[0], fin = dias[0];
  for (let j = 1; j <= dias.length; j++){
    if (dias[j] === fin + 1){ fin = dias[j]; continue; }
    partes.push(ini === fin ? etiqueta(VIAJE.dias[ini], ini)
      : `${etiqueta(VIAJE.dias[ini], ini)}–${etiqueta(VIAJE.dias[fin], fin)}`);
    ini = fin = dias[j];
  }
  return partes.join(" · ") + " jul";
}

/* ---- Vista HOY ---- */
function vistaHoy(){
  const i = indiceHoy();
  const dia = VIAJE.dias[i];
  const sig = VIAJE.dias[i+1];
  const f = fecha(dia.f);
  const empezado = hoyISO() >= VIAJE.dias[0].f;

  document.getElementById("eyebrow").textContent = empezado ? `${f.wd} · ${f.txt}` : "Cuenta atrás";
  document.getElementById("title").textContent = dia.t;
  document.getElementById("subtitle").textContent = `Duermes en ${dia.base}`;

  let h = cabecera(dia) + botonesRuta(i) + pintaParadas(dia, i);
  if (sig){
    const fs = fecha(sig.f);
    h += `<div class="sec"><span class="label">Mañana · ${esc(fs.wd)}</span><h2>${esc(sig.t)}</h2></div>
          <p class="note">${sig.paradas.map(p => esc(p.txt)).join(" · ")}</p>`;
  }
  document.getElementById("v-hoy").innerHTML = h;
  activaEnlacesGuia(); activaDiario();
}

/* ---- Vista DÍAS ---- */
function vistaDias(){
  const h = hoyISO();
  document.getElementById("v-dias").innerHTML =
    `<div class="sec"><span class="label">18 → 29 julio</span><h2>Los doce días</h2></div>` + mapaRuta() +
    VIAJE.dias.map((d,i) => {
      const f = fecha(d.f);
      const cls = d.f === h ? "today" : (d.f < h ? "past" : "");
      return `<button class="day ${cls}" data-i="${i}">
        <span class="num">${esc(f.txt)}</span>
        <span class="ttl">${esc(d.t)}<span class="wd">${esc(f.wd)} · ${esc(d.base)}</span></span>
      </button>`;
    }).join("") + `<div id="detalle"></div>`;

  document.querySelectorAll(".mapa .cama").forEach(g => g.addEventListener("click", () => {
    const b = document.querySelector(`.day[data-i="${g.dataset.dia}"]`);
    if (b) b.click();
  }));
  document.querySelectorAll(".day").forEach(b => b.addEventListener("click", () => {
    const i = +b.dataset.i, d = VIAJE.dias[i], f = fecha(d.f);
    const det = document.getElementById("detalle");
    det.innerHTML = `<div class="sec"><span class="label">${esc(f.wd)} ${esc(f.txt)}</span><h2>${esc(d.t)}</h2></div>${cabecera(d)}${botonesRuta(i)}${pintaParadas(d, i)}`;
    activaEnlacesGuia(); activaDiario();
    det.scrollIntoView?.({behavior:"smooth", block:"start"});
  }));
}

/* ---- Contraseña guardada solo en este dispositivo ---- */
const CLAVE = "eslovenia26_pw";
function pintaPassword(){
  const campo = document.getElementById("pw");
  const zona  = document.getElementById("pw-set");
  if (!campo || !zona) return;
  let guardada = "";
  try { guardada = localStorage.getItem(CLAVE) || ""; } catch {}

  if (!guardada){
    campo.innerHTML = '<span class="fill">sin guardar</span>';
    zona.innerHTML = `
      <div class="btns" style="margin-top:10px">
        <input type="password" id="pw-in" placeholder="Pega la contraseña"
          style="flex:1;min-width:150px;padding:9px 12px;border-radius:999px;border:1px solid var(--soca-dim);
                 background:transparent;color:var(--paper);font-family:var(--mono);font-size:13.5px">
        <button class="btn solid" id="pw-save">Guardar</button>
      </div>`;
    document.getElementById("pw-save").addEventListener("click", () => {
      const v = document.getElementById("pw-in").value.trim();
      if (!v) return;
      try { localStorage.setItem(CLAVE, v); } catch {}
      pintaPassword();
    });
    return;
  }

  campo.textContent = "••••••••••••";
  zona.innerHTML = `
    <div class="btns" style="margin-top:10px">
      <button class="btn" id="pw-toggle">Mostrar</button>
      <button class="btn" data-copy="${guardada.replace(/"/g,"&quot;")}">Copiar contraseña</button>
      <button class="btn" id="pw-del">Borrar</button>
    </div>`;

  document.getElementById("pw-toggle").addEventListener("click", e => {
    const oculta = campo.textContent === "••••••••••••";
    campo.textContent = oculta ? guardada : "••••••••••••";
    e.target.textContent = oculta ? "Ocultar" : "Mostrar";
  });
  document.getElementById("pw-del").addEventListener("click", () => {
    try { localStorage.removeItem(CLAVE); } catch {}
    pintaPassword();
  });
  activaCopiar();
}

/* ---- Copiar al portapapeles ---- */
function activaCopiar(){
  document.querySelectorAll("[data-copy]").forEach(b => {
    if (b.dataset.listo) return;
    b.dataset.listo = "1";
    b.addEventListener("click", async () => {
      const txt = b.dataset.copy, original = b.textContent;
      try {
        if (navigator.clipboard) await navigator.clipboard.writeText(txt);
        else throw new Error("sin API");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = txt; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); } catch {}
        document.body.removeChild(ta);
      }
      b.textContent = "Copiado";
      setTimeout(() => { b.textContent = original; }, 1400);
    });
  });
}

/* ---- Vista GUÍA ---- */
let filtroGuia = "";

function vistaGuia(){
  const q = filtroGuia.trim().toLowerCase();
  const coincide = l => !q || (l.n + " " + l.t + " " + l.zona).toLowerCase().includes(q);

  let html = `<input class="buscador" id="q" type="search" placeholder="Buscar un sitio…" value="${esc(filtroGuia)}">` + bloqueCerca();
  let total = 0;

  GUIA.forEach(z => {
    const ls = z.lugares.filter(coincide);
    if (!ls.length) return;
    total += ls.length;
    html += `<div class="zona">
      <div class="zona-cab"><h2>${esc(z.zona)}</h2><span class="cuenta">${ls.length}</span></div>
      <p class="intro">${esc(z.nota)}</p>` + ilustra(z.arte) +
      ls.map(l => ficha(l)).join("") + rutasCercanas(z) + `</div>`;
  });

  if (!total) html += `<p class="vacio">Nada con ese nombre. Prueba con otra palabra.</p>`;
  document.getElementById("v-guia").innerHTML = html;

  const inp = document.getElementById("q");
  inp.addEventListener("input", e => {
    filtroGuia = e.target.value;
    const pos = e.target.selectionStart;
    vistaGuia();
    const nuevo = document.getElementById("q");
    nuevo.focus(); nuevo.setSelectionRange(pos, pos);
  });
  activaFichas(); activaCerca(); activaEnlacesGuia();
}

}

function activaEnlacesGuia(){
  document.querySelectorAll("[data-guia]").forEach(b => {
    if (b.dataset.listo) return;
    b.dataset.listo = "1";
    b.addEventListener("click", () => abrirGuia(b.dataset.guia));
  });
}

/* ---- Navegación ---- */
const vistas = {hoy:vistaHoy, dias:vistaDias, reservas:vistaReservas, guia:vistaGuia, info:vistaInfo};
const TITULOS = {dias:"Itinerario", reservas:"Reservas", guia:"Guía de lugares", info:"Información"};

function vePestana(v){
  document.querySelectorAll("nav button").forEach(x => x.classList.toggle("on", x.dataset.v === v));
  document.querySelectorAll(".view").forEach(x => x.classList.toggle("on", x.id === "v-" + v));
  vistas[v]();
  if (v !== "hoy"){
    document.getElementById("eyebrow").textContent = VIAJE.nombre;
    document.getElementById("title").textContent = TITULOS[v];
    document.getElementById("subtitle").textContent = v === "guia"
      ? `${Object.keys(LUGARES).length} sitios recopilados`
      : `Julio ${VIAJE.anio}`;
  }
  window.scrollTo({top:0});
}

document.querySelectorAll("nav button").forEach(b =>
  b.addEventListener("click", () => vePestana(b.dataset.v)));

aplicaTema();
vistaHoy();

/* ---- Funcionamiento sin cobertura ---- */
if ("serviceWorker" in navigator){
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
</body>
</html>
