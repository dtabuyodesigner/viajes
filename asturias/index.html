<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asturias">
<meta name="theme-color" content="#0F1E14">
<title>Asturias occidental</title>
<style>
:root{
  --monte:#0F1E14;        /* fondo: bosque cerrado */
  --monte-2:#1A2E20;      /* superficie elevada */
  --prau:#7FB069;         /* verde de prado: acento principal */
  --prau-dim:#4A7A50;
  --mar:#5AA9C4;          /* azul cantábrico */
  --teito:#C89B3C;        /* ámbar de escoba y madera */
  --oso:#B2543A;          /* rojo tierra, para avisos */
  --papel:#ECF2E9;
  --papel-dim:#93A895;
  --line:rgba(127,176,105,.18);
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--monte);color:var(--papel);font-family:var(--sans);font-size:16px;line-height:1.5;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased}
a{color:var(--prau);text-decoration:none}
:focus-visible{outline:2px solid var(--teito);outline-offset:2px;border-radius:4px}

header{position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,var(--monte) 72%,rgba(15,30,20,0));
  padding:calc(14px + env(safe-area-inset-top)) 20px 18px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--prau-dim);margin:0 0 4px}
h1{font-size:27px;line-height:1.12;letter-spacing:-.025em;font-weight:800;margin:0}
.sub{color:var(--papel-dim);font-size:14px;margin:6px 0 0}

main{padding:0 20px 32px;max-width:640px;margin:0 auto}
.view{display:none;animation:in .22s ease-out}
.view.on{display:block}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.view{animation:none}}

.art{display:block;width:100%;height:120px;border-radius:14px;margin:2px 0 18px;
  background:#0A1710;border:1px solid var(--line)}

.senda{position:relative;margin:8px 0 0;padding-left:28px}
.senda::before{content:"";position:absolute;left:7px;top:8px;bottom:8px;width:3px;
  background:linear-gradient(180deg,var(--prau),var(--prau-dim));border-radius:3px;opacity:.55}
.stop{position:relative;padding:0 0 22px}
.stop::before{content:"";position:absolute;left:-25px;top:7px;width:11px;height:11px;border-radius:50%;
  background:var(--monte);border:3px solid var(--prau)}
.stop.key::before{background:var(--teito);border-color:var(--teito)}
.t{font-family:var(--mono);font-size:12px;color:var(--teito);letter-spacing:.06em;display:block;margin-bottom:2px}
.stop p{margin:0;font-size:16px}
.stop small{display:block;color:var(--papel-dim);font-size:13.5px;margin-top:3px;line-height:1.45}

.card{background:var(--monte-2);border:1px solid var(--line);border-radius:14px;padding:16px;margin:0 0 12px}
.card h3{margin:0 0 10px;font-size:16px;letter-spacing:-.01em}
.label{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--prau-dim)}
.row{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-top:1px solid var(--line)}
.row:first-of-type{border-top:0}
.row .k{color:var(--papel-dim);font-size:14px;flex:0 0 auto}
.row .v{text-align:right;font-size:15px}
.mono{font-family:var(--mono);letter-spacing:.03em}

.day{width:100%;text-align:left;display:flex;gap:14px;align-items:baseline;background:none;border:0;
  border-top:1px solid var(--line);padding:15px 2px;color:inherit;font:inherit;cursor:pointer}
.day:first-child{border-top:0}
.day .num{font-family:var(--mono);font-size:12.5px;color:var(--prau);flex:0 0 52px;letter-spacing:.04em}
.day .ttl{font-size:16px;font-weight:600;letter-spacing:-.01em}
.day .wd{display:block;font-size:12.5px;color:var(--papel-dim);font-weight:400;margin-top:2px}
.day.past{opacity:.42}
.day.today .num{color:var(--teito);font-weight:700}

.btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.btn{display:inline-block;padding:9px 14px;border-radius:999px;border:1px solid var(--prau-dim);
  color:var(--prau);font-size:13.5px;font-weight:600;background:none;cursor:pointer}
.btn.solid{background:var(--prau);color:var(--monte);border-color:var(--prau)}
.btn.wl{border-color:var(--mar);color:var(--mar)}

nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:grid;grid-template-columns:repeat(4,1fr);
  background:rgba(15,30,20,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom)}
nav button{background:none;border:0;padding:11px 4px 12px;cursor:pointer;color:var(--papel-dim);
  font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase}
nav button svg{display:block;margin:0 auto 5px;width:21px;height:21px;stroke:currentColor;fill:none;
  stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--prau)}

.sec{margin:26px 0 10px}
.sec .label{display:block;margin-bottom:2px}
.sec h2{margin:0;font-size:19px;letter-spacing:-.02em}
ul.plain{list-style:none;margin:0;padding:0}
ul.plain li{padding:8px 0;border-top:1px solid var(--line);font-size:15px}
ul.plain li:first-child{border-top:0}
ul.plain li span{color:var(--papel-dim)}
.note{font-size:13.5px;color:var(--papel-dim);line-height:1.5;margin:10px 0 0}

.ruta{background:var(--monte-2);border:1px solid var(--line);border-radius:14px;padding:15px;margin:0 0 20px}
.wz-lista{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.wz{display:inline-flex;align-items:center;gap:8px;padding:9px 13px 9px 9px;border-radius:999px;
  border:1px solid var(--prau-dim);color:var(--papel);font-size:13.5px;font-weight:500;
  text-decoration:none;max-width:100%}
.wz b{flex:0 0 auto;width:21px;height:21px;border-radius:50%;background:var(--prau);color:var(--monte);
  font-family:var(--mono);font-size:11.5px;font-weight:700;display:grid;place-items:center}
.wz.cama{border-color:var(--teito)}
.wz.cama b{background:var(--teito)}

.park{display:flex;gap:10px;align-items:flex-start;margin:10px 0 0;padding:10px 12px;
  background:rgba(200,155,60,.09);border:1px solid rgba(200,155,60,.3);border-radius:11px}
.park.free{background:rgba(127,176,105,.1);border-color:rgba(127,176,105,.35)}
.park .pk{flex:0 0 auto;width:20px;height:20px;border-radius:5px;background:var(--teito);color:var(--monte);
  font-family:var(--mono);font-size:12px;font-weight:700;display:grid;place-items:center;margin-top:1px}
.park.free .pk{background:var(--prau)}
.park b{display:block;font-size:13.5px;font-weight:600;color:var(--papel)}
.park small{display:block;color:var(--papel-dim);font-size:12.5px;line-height:1.45;margin-top:2px}

.aviso{display:flex;gap:11px;padding:13px 14px;border-radius:12px;margin:0 0 16px;
  background:rgba(178,84,58,.12);border:1px solid rgba(178,84,58,.35)}
.aviso .ic{flex:0 0 auto;width:21px;height:21px;border-radius:50%;background:var(--oso);color:#fff;
  font-family:var(--mono);font-size:13px;font-weight:700;display:grid;place-items:center}
.aviso p{margin:0;font-size:13.5px;line-height:1.5;color:#E8D5CE}

.ops{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.op{flex:1 1 140px;text-align:left;padding:11px 13px;border-radius:12px;cursor:pointer;
  background:transparent;border:1px solid var(--line);color:var(--papel);font:inherit}
.op b{display:block;font-size:14px;font-weight:600}
.op small{display:block;font-size:11.5px;color:var(--papel-dim);margin-top:2px;line-height:1.35}
.op.on{border-color:var(--prau);background:rgba(127,176,105,.11)}
.op.on b{color:var(--prau)}

.zona{margin:24px 0 0}
.zona h2{margin:0;font-size:19px;letter-spacing:-.02em}
.zona .intro{font-size:13.5px;color:var(--papel-dim);margin:4px 0 12px;line-height:1.5}
.lugar{border-top:1px solid var(--line)}
.lugar:first-of-type{border-top:0}
.lugar-cab{width:100%;display:flex;justify-content:space-between;align-items:center;gap:12px;
  background:none;border:0;padding:14px 2px;color:inherit;font:inherit;cursor:pointer;text-align:left}
.lugar-cab .nom{font-size:15.5px;font-weight:600}
.lugar-cab .dia{display:block;font-family:var(--mono);font-size:11px;color:var(--teito);
  letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.lugar-cab .mas{flex:0 0 auto;color:var(--prau);font-size:19px;line-height:1;transition:transform .2s}
.lugar.abierto .mas{transform:rotate(45deg)}
.lugar-cuerpo{display:none;padding:0 2px 18px}
.lugar.abierto .lugar-cuerpo{display:block}
.lugar-cuerpo p{margin:0 0 12px;font-size:14.5px;line-height:1.55;color:#CFDBCB}
.datos{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.dato{background:rgba(127,176,105,.09);border:1px solid var(--line);border-radius:10px;padding:7px 11px}
.dato b{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--prau-dim);font-weight:400;margin-bottom:2px}
.dato span{font-size:13.5px}
.lnk{background:none;border:0;padding:0;font:inherit;color:var(--prau);cursor:pointer;
  font-size:13.5px;text-decoration:underline;text-underline-offset:3px}
.buscador{width:100%;padding:12px 15px;margin:4px 0 6px;border-radius:12px;border:1px solid var(--line);
  background:var(--monte-2);color:var(--papel);font-family:var(--sans);font-size:15px}
.buscador::placeholder{color:var(--papel-dim)}
.vacio{color:var(--papel-dim);font-size:14px;padding:18px 2px}
</style>
</head>
<body>

<header>
  <p class="eyebrow" id="eyebrow">Asturias occidental</p>
  <h1 id="title">Cargando</h1>
  <p class="sub" id="subtitle"></p>
</header>

<main>
  <section class="view on" id="v-hoy"></section>
  <section class="view" id="v-dias"></section>
  <section class="view" id="v-guia"></section>
  <section class="view" id="v-info"></section>
</main>

<nav>
  <button class="on" data-v="hoy"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>Hoy</button>
  <button data-v="dias"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>Días</button>
  <button data-v="guia"><svg viewBox="0 0 24 24"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15H6.5A2.5 2.5 0 0 0 4 20.5z"/><path d="M9 8h7M9 12h5"/></svg>Guía</button>
  <button data-v="info"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>Info</button>
</nav>

const DIAS_SEM = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const esc = s => String(s??"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const mapa = q => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
const wikiloc = q => `https://es.wikiloc.com/rutas/buscar?q=${encodeURIComponent(q)}`;

/* ---- Preferencias, guardadas en este móvil ---- */
const PREF = {
  get app(){ try { return localStorage.getItem("ast_app") || "waze"; } catch { return "waze"; } },
  set app(v){ try { localStorage.setItem("ast_app", v); } catch {} },
  get via(){ try { return localStorage.getItem("ast_via") || "rapido"; } catch { return "rapido"; } },
  set via(v){ try { localStorage.setItem("ast_via", v); } catch {} },
  get salida(){ try { return localStorage.getItem("ast_salida") || ""; } catch { return ""; } },
  set salida(v){ try { v ? localStorage.setItem("ast_salida", v) : localStorage.removeItem("ast_salida"); } catch {} }
};

const EVITAR = { rapido:"", sinpeajes:"tolls", secundarias:"tolls,highways" };
const VIAS = [
  ["rapido",      "Lo más rápido", "Autovía incluida"],
  ["sinpeajes",   "Sin peajes",    "Autovía y nacional"],
  ["secundarias", "Por carreteras","Evita autovía y peaje"]
];

function navegar(q){
  if (PREF.app === "waze") return `https://waze.com/ul?q=${encodeURIComponent(q)}&navigate=yes`;
  const u = new URLSearchParams({ api:"1", destination:q, travelmode:"driving" });
  const ev = EVITAR[PREF.via];
  if (ev) u.set("avoid", ev);
  return `https://www.google.com/maps/dir/?${u}`;
}
const comoNavego = () => PREF.app === "waze" ? "Waze" : "Maps";

/* ---- Qué día del viaje es hoy ---- */
function hoyISO(){
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`;
}
function fechaDe(i){
  if (!PREF.salida) return null;
  const d = new Date(PREF.salida + "T12:00:00");
  d.setDate(d.getDate() + i);
  return { d, wd:DIAS_SEM[d.getDay()], txt:`${d.getDate()} ${MESES[d.getMonth()]}`,
           iso:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}` };
}
function indiceHoy(){
  if (!PREF.salida) return 0;
  const h = hoyISO();
  for (let i = 0; i < VIAJE.dias.length; i++) if (fechaDe(i).iso === h) return i;
  return h < PREF.salida ? 0 : VIAJE.dias.length - 1;
}

/* ---- Rutas del día ---- */
function botonesRuta(i){
  const d = VIAJE.dias[i];
  const tramos = d.paradas.filter(p => p.mapa);
  const chips = tramos.map((p, k) =>
    `<a class="wz" href="${navegar(p.park?.w || p.w || p.mapa)}" target="_blank" rel="noopener">
       <b>${k+1}</b>${esc(p.c || p.txt)}</a>`).join("");
  return `<div class="ruta">
    <span class="label">Navegar con ${comoNavego()} · ${esc(d.km)}</span>
    <div class="wz-lista">${chips}</div>
    <p class="note" style="margin:10px 0 0">Un destino por vez: dale al siguiente número según vayáis llegando.</p>
  </div>`;
}

function pintaParadas(dia){
  return `<div class="senda">` + dia.paradas.map(p => `
    <div class="stop${p.key ? " key" : ""}">
      ${p.h ? `<span class="t">${esc(p.h)}</span>` : ""}
      <p>${esc(p.txt)}</p>
      ${p.n ? `<small>${esc(p.n)}</small>` : ""}
      ${p.mapa ? `<small><a href="${navegar(p.park?.w || p.w || p.mapa)}" target="_blank" rel="noopener">Ir con ${comoNavego()} →</a></small>` : ""}
      ${p.wl ? `<small><a href="${wikiloc(p.wl)}" target="_blank" rel="noopener">Buscar la ruta en Wikiloc →</a></small>` : ""}
      ${p.g ? `<small><button class="lnk" data-guia="${esc(p.g)}">Qué es y qué ver →</button></small>` : ""}
      ${p.park ? `<div class="park${p.park.gratis ? " free" : ""}">
        <span class="pk">P</span>
        <div><b>${esc(p.park.n)}</b><small>${esc(p.park.p)}</small></div>
      </div>` : ""}
    </div>`).join("") + `</div>`;
}

/* ---- Vista HOY ---- */
function vistaHoy(){
  const i = indiceHoy(), dia = VIAJE.dias[i], f = fechaDe(i);
  document.getElementById("eyebrow").textContent = f ? `${f.wd} · ${f.txt}` : `Día ${dia.d} de 5`;
  document.getElementById("title").textContent = dia.t;
  document.getElementById("subtitle").textContent = `Duermes en ${dia.base}`;

  let h = "";
  if (!PREF.salida){
    h += `<div class="card">
      <span class="label">Todavía sin fechas</span>
      <h3>¿Salís hoy?</h3>
      <p class="note" style="margin-top:0">Fija el día de salida y la app irá sola: cada mañana te abrirá el día que toca.</p>
      <div class="btns">
        <button class="btn solid" id="salir-hoy">Empezamos hoy</button>
        <label class="btn" style="cursor:pointer">Elegir fecha
          <input type="date" id="fecha" style="display:none"></label>
      </div>
    </div>`;
  }
  h += ilustra(dia.arte) + botonesRuta(i) + pintaParadas(dia);

  const sig = VIAJE.dias[i+1];
  if (sig) h += `<div class="sec"><span class="label">Día siguiente</span><h2>${esc(sig.t)}</h2></div>
    <p class="note">${sig.paradas.map(p => esc(p.c || p.txt)).join(" · ")}</p>`;

  document.getElementById("v-hoy").innerHTML = h;

  const bt = document.getElementById("salir-hoy");
  if (bt) bt.addEventListener("click", () => { PREF.salida = hoyISO(); vistaHoy(); });
  const fe = document.getElementById("fecha");
  if (fe){
    fe.addEventListener("change", e => { if (e.target.value){ PREF.salida = e.target.value; vistaHoy(); } });
    fe.parentElement.addEventListener("click", () => fe.showPicker ? fe.showPicker() : fe.click());
  }
  activaEnlacesGuia();
}

/* ---- Vista DÍAS ---- */
function vistaDias(){
  const hoy = indiceHoy();
  document.getElementById("v-dias").innerHTML =
    `<div class="sec"><span class="label">Cinco días</span><h2>El recorrido</h2></div>` +
    VIAJE.dias.map((d,i) => {
      const f = fechaDe(i);
      const cls = PREF.salida ? (i === hoy ? "today" : (f && f.iso < hoyISO() ? "past" : "")) : "";
      return `<button class="day ${cls}" data-i="${i}">
        <span class="num">${f ? esc(f.txt) : "Día " + d.d}</span>
        <span class="ttl">${esc(d.t)}<span class="wd">${f ? esc(f.wd) + " · " : ""}${esc(d.km)}</span></span>
      </button>`;
    }).join("") +
    (PREF.salida ? `<p class="note">Salida fijada el ${esc(fechaDe(0).txt)}. <button class="lnk" id="borrar-fecha">Cambiar</button></p>` : "") +
    `<div id="detalle"></div>`;

  document.querySelectorAll(".day").forEach(b => b.addEventListener("click", () => {
    const i = +b.dataset.i, d = VIAJE.dias[i], f = fechaDe(i);
    const det = document.getElementById("detalle");
    det.innerHTML = `<div class="sec"><span class="label">${f ? esc(f.wd) + " " + esc(f.txt) : "Día " + d.d}</span>
      <h2>${esc(d.t)}</h2></div>${ilustra(d.arte)}${botonesRuta(i)}${pintaParadas(d)}`;
    activaEnlacesGuia();
    det.scrollIntoView?.({behavior:"smooth", block:"start"});
  }));
  const bf = document.getElementById("borrar-fecha");
  if (bf) bf.addEventListener("click", () => { PREF.salida = ""; vistaDias(); });
}

/* ---- Vista GUÍA ---- */
const LUGARES = {};
VIAJE.guia.forEach(z => z.lugares.forEach(l => { LUGARES[l.id] = l; l.zona = z.zona; }));
let filtroGuia = "";

function vistaGuia(){
  const q = filtroGuia.trim().toLowerCase();
  const ok = l => !q || (l.n + " " + l.t + " " + l.zona).toLowerCase().includes(q);
  let html = `<input class="buscador" id="q" type="search" placeholder="Buscar un sitio…" value="${esc(filtroGuia)}">`;
  let total = 0;
  VIAJE.guia.forEach(z => {
    const ls = z.lugares.filter(ok);
    if (!ls.length) return;
    total += ls.length;
    html += `<div class="zona"><h2>${esc(z.zona)}</h2><p class="intro">${esc(z.nota)}</p>`
         + ilustra(z.arte) + ls.map(ficha).join("") + `</div>`;
  });
  if (!total) html += `<p class="vacio">Nada con ese nombre. Prueba con otra palabra.</p>`;
  document.getElementById("v-guia").innerHTML = html;

  const inp = document.getElementById("q");
  inp.addEventListener("input", e => {
    filtroGuia = e.target.value;
    const pos = e.target.selectionStart;
    vistaGuia();
    const n = document.getElementById("q"); n.focus(); n.setSelectionRange(pos,pos);
  });
  activaFichas();
}

function ficha(l){
  return `<div class="lugar" id="l-${esc(l.id)}">
    <button class="lugar-cab">
      <span><span class="nom">${esc(l.n)}</span>
      ${l.d ? `<span class="dia">Día ${l.d} · en la ruta</span>` : ""}</span>
      <span class="mas">+</span>
    </button>
    <div class="lugar-cuerpo">
      <p>${esc(l.t)}</p>
      ${l.k ? `<div class="datos">${l.k.map(([a,b]) =>
        `<div class="dato"><b>${esc(a)}</b><span>${esc(b)}</span></div>`).join("")}</div>` : ""}
      <div class="btns">
        ${l.m ? `<a class="btn solid" href="${navegar(l.m)}" target="_blank" rel="noopener">Ir con ${comoNavego()}</a>
                 <a class="btn" href="${mapa(l.m)}" target="_blank" rel="noopener">Ver en Maps</a>` : ""}
        ${l.wl ? `<a class="btn wl" href="${wikiloc(l.wl)}" target="_blank" rel="noopener">Wikiloc</a>` : ""}
      </div>
    </div>
  </div>`;
}

function activaFichas(){
  document.querySelectorAll(".lugar-cab").forEach(b =>
    b.addEventListener("click", () => b.parentElement.classList.toggle("abierto")));
}
function abrirGuia(id){
  filtroGuia = "";
  vePestana("guia");
  const el = document.getElementById("l-" + id);
  if (!el) return;
  el.classList.add("abierto");
  setTimeout(() => el.scrollIntoView?.({behavior:"smooth", block:"center"}), 60);
}
function activaEnlacesGuia(){
  document.querySelectorAll("[data-guia]").forEach(b => {
    if (b.dataset.listo) return;
    b.dataset.listo = "1";
    b.addEventListener("click", () => abrirGuia(b.dataset.guia));
  });
}

    <ul class="plain">${filas.map(([a,b]) =>
      `<li><strong>${esc(a)}</strong> · <span>${esc(b)}</span></li>`).join("")}</ul>`;

  document.getElementById("v-info").innerHTML =
    `<div class="aviso"><span class="ic">!</span>
      <p>Somiedo es territorio de osos, lobos y mastines de rebaño. Bella y Lisboa atadas en todo el parque.</p></div>` +
    panelNav() +
    bloque("Bella y Lisboa", "Con las perras", VIAJE.info.perras) +
    bloque("Dormir y conducir", "La furgo", VIAJE.info.furgo) +
    bloque("Día a día", "Práctico", VIAJE.info.practico);

  document.querySelectorAll("[data-app]").forEach(b =>
    b.addEventListener("click", () => { PREF.app = b.dataset.app; vistaInfo(); }));
  document.querySelectorAll("[data-via]").forEach(b =>
    b.addEventListener("click", () => { PREF.via = b.dataset.via; vistaInfo(); }));
}

/* ---- Navegación ---- */
const vistas = { hoy:vistaHoy, dias:vistaDias, guia:vistaGuia, info:vistaInfo };
const TITULOS = { dias:"El recorrido", guia:"Guía de lugares", info:"Información" };

function vePestana(v){
  document.querySelectorAll("nav button").forEach(x => x.classList.toggle("on", x.dataset.v === v));
  document.querySelectorAll(".view").forEach(x => x.classList.toggle("on", x.id === "v-" + v));
  vistas[v]();
  if (v !== "hoy"){
    document.getElementById("eyebrow").textContent = VIAJE.nombre;
    document.getElementById("title").textContent = TITULOS[v];
    document.getElementById("subtitle").textContent = v === "guia"
      ? `${Object.keys(LUGARES).length} sitios recopilados`
      : `Desde ${VIAJE.salida}`;
  }
  window.scrollTo({top:0});
}
document.querySelectorAll("nav button").forEach(b =>
  b.addEventListener("click", () => vePestana(b.dataset.v)));

vistaHoy();

if ("serviceWorker" in navigator){
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
</body>
</html>
