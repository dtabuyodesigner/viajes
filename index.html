<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Viajes">
<meta name="theme-color" content="#12181C">
<title>Viajes</title>
<style>
:root{
  --fondo:#12181C; --fondo-2:#1C252A; --tinta:#EDF1F3; --tinta-dim:#93A3AA;
  --linea:rgba(237,241,243,.12);
  --soca:#4FC3B8;   /* Eslovenia */
  --prau:#7FB069;   /* Asturias */
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--fondo);color:var(--tinta);font-family:var(--sans);
  line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
header{padding:calc(34px + env(safe-area-inset-top)) 22px 10px;max-width:640px;margin:0 auto}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--tinta-dim);margin:0 0 6px}
h1{font-size:34px;line-height:1.08;letter-spacing:-.03em;font-weight:800;margin:0}
main{padding:14px 22px calc(40px + env(safe-area-inset-bottom));max-width:640px;margin:0 auto}

.viaje{display:block;position:relative;overflow:hidden;text-decoration:none;color:inherit;
  background:var(--fondo-2);border:1px solid var(--linea);border-radius:18px;
  padding:0;margin:0 0 14px}
.viaje .art{display:block;width:100%;height:104px}
.viaje .cuerpo{padding:15px 17px 17px}
.viaje h2{margin:0;font-size:21px;letter-spacing:-.02em}
.viaje .fechas{font-family:var(--mono);font-size:12px;letter-spacing:.05em;
  color:var(--tinta-dim);margin:5px 0 0}
.viaje .estado{display:inline-flex;align-items:center;gap:7px;margin-top:11px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase}
.punto{width:7px;height:7px;border-radius:50%;background:currentColor}
.viaje.curso .estado{color:var(--acento)}
.viaje.futuro .estado,.viaje.hecho .estado{color:var(--tinta-dim)}
.viaje.hecho{opacity:.62}
.viaje .flecha{position:absolute;right:17px;bottom:17px;font-size:20px;color:var(--acento)}
.nota{font-size:13px;color:var(--tinta-dim);line-height:1.55;margin:22px 2px 0}
</style>
</head>
<body>
<header>
  <p class="eyebrow" id="saludo">Viajes</p>
  <h1>¿A dónde<br>vamos?</h1>
</header>
<main id="lista"></main>

<script>
const VIAJES = [
  { id:"eslovenia", n:"Eslovenia y Venecia", ruta:"eslovenia/",
    desde:"2026-07-18", hasta:"2026-07-29", acento:"#4FC3B8",
    art:`<svg viewBox="0 0 400 104" preserveAspectRatio="xMidYMid slice">
      <rect width="400" height="104" fill="#0E2A28"/>
      <path d="M0 54l80-32 70 28 80-28 90 32 80-18v18H0z" fill="#163B37"/>
      <path d="M0 54h400v50H0z" fill="#2C7C76" opacity=".5"/>
      <ellipse cx="180" cy="76" rx="42" ry="11" fill="#163B37"/>
      <path d="M170 68V50h20v18z" fill="#0E2A28"/><path d="M168 50l12-10 12 10z" fill="#0E2A28"/>
      <path d="M198 68V40h9v28z" fill="#0E2A28"/><path d="M197 40l5-10 5 10z" fill="#D9A233"/>
      <g stroke="#4FC3B8" stroke-width="2" opacity=".45" stroke-linecap="round">
        <path d="M40 90h60M250 84h70M60 98h80"/></g></svg>` },

  { id:"asturias", n:"Asturias occidental", ruta:"asturias/",
    desde:"", hasta:"", acento:"#7FB069",
    art:`<svg viewBox="0 0 400 104" preserveAspectRatio="xMidYMid slice">
      <rect width="400" height="104" fill="#0F1E14"/>
      <path d="M0 104L110 20l70 50 60-36 160 70z" fill="#1A2E20"/>
      <path d="M0 104L150 48l130 56z" fill="#24422A"/>
      <ellipse cx="120" cy="80" rx="46" ry="11" fill="#5AA9C4" opacity=".55"/>
      <g fill="#0F1E14"><path d="M60 70l10-15 10 15z"/><path d="M300 96l12-18 12 18z"/></g>
      <g stroke="#C89B3C" stroke-width="3" fill="none" stroke-linecap="round">
        <path d="M250 104h60l-40-13h62"/></g></svg>` }
];

const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const hoy = (() => { const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`; })();

function textoFechas(v){
  if (!v.desde) return "Sin fechas todavía";
  const a = new Date(v.desde+"T12:00:00"), b = new Date(v.hasta+"T12:00:00");
  return `${a.getDate()} ${MESES[a.getMonth()]} — ${b.getDate()} ${MESES[b.getMonth()]} ${b.getFullYear()}`;
}
function estado(v){
  if (!v.desde) return ["futuro","Por planear"];
  if (hoy < v.desde) return ["futuro","Próximamente"];
  if (hoy > v.hasta) return ["hecho","Terminado"];
  const d = Math.round((new Date(hoy) - new Date(v.desde)) / 86400000) + 1;
  return ["curso", `En curso · día ${d}`];
}

document.getElementById("lista").innerHTML = VIAJES.map(v => {
  const [cls, txt] = estado(v);
  return `<a class="viaje ${cls}" href="${v.ruta}" style="--acento:${v.acento}">
    <span class="art">${v.art}</span>
    <span class="cuerpo">
      <h2>${v.n}</h2>
      <p class="fechas">${textoFechas(v)}</p>
      <span class="estado"><span class="punto"></span>${txt}</span>
      <span class="flecha">→</span>
    </span>
  </a>`;
}).join("") + `<p class="nota">Cada viaje funciona sin cobertura una vez abierto con datos. Puedes añadir cualquiera de ellos a la pantalla de inicio por separado.</p>`;

const enCurso = VIAJES.find(v => estado(v)[0] === "curso");
document.getElementById("saludo").textContent = enCurso ? "Viaje en curso" : "Viajes";

if ("serviceWorker" in navigator){
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
</body>
</html>
